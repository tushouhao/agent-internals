<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1f3d"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
    <linearGradient id="fuse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#8b6a1a" stop-opacity="0.8"/>
      <stop offset="0.5" stop-color="#1e6a3a" stop-opacity="0.8"/>
      <stop offset="1" stop-color="#1e3a5f" stop-opacity="0.8"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- 单 Agent 阶 -->
  <g transform="translate(60,120)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e3a5f" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="18" font-family="serif">单 Agent</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="13" font-family="sans">独揽全流程 41%</text>
  </g>

  <!-- 流水线阶 -->
  <g transform="translate(260,100)">
    <rect x="0" y="0" width="120" height="60" rx="6" fill="#2d4a7a" stroke="#fff" stroke-width="1.2"/>
    <text x="60" y="35" text-anchor="middle" fill="#fff" font-size="15" font-family="serif">编码 Agent</text>
  </g>
  <g transform="translate(260,180)">
    <rect x="0" y="0" width="120" height="60" rx="6" fill="#2d4a7a" stroke="#fff" stroke-width="1.2"/>
    <text x="60" y="35" text-anchor="middle" fill="#fff" font-size="15" font-family="serif">测试 Agent</text>
  </g>
  <g transform="translate(260,260)">
    <rect x="0" y="0" width="120" height="60" rx="6" fill="#2d4a7a" stroke="#fff" stroke-width="1.2"/>
    <text x="60" y="35" text-anchor="middle" fill="#fff" font-size="15" font-family="serif">部署 Agent</text>
  </g>
  <g stroke="#fff" stroke-width="1.5" fill="none">
    <path d="M320,160 L320,180"/>
    <path d="M320,240 L320,260"/>
  </g>
  <text x="390" y="200" fill="#8b1a1a" font-size="13" font-family="sans">失配 22%</text>

  <!-- 协作团队阶 -->
  <g transform="translate(560,100)">
    <rect x="0" y="0" width="140" height="60" rx="6" fill="#0a1f3d" stroke="#d4a017" stroke-width="1.5"/>
    <text x="70" y="35" text-anchor="middle" fill="#d4a017" font-size="15" font-family="serif">架构 Agent</text>
  </g>
  <g transform="translate(720,120)">
    <rect x="0" y="0" width="110" height="55" rx="6" fill="#2d4a7a" stroke="#fff" stroke-width="1.2"/>
    <text x="55" y="33" text-anchor="middle" fill="#fff" font-size="14" font-family="serif">编码</text>
  </g>
  <g transform="translate(720,195)">
    <rect x="0" y="0" width="110" height="55" rx="6" fill="#2d4a7a" stroke="#fff" stroke-width="1.2"/>
    <text x="55" y="33" text-anchor="middle" fill="#fff" font-size="14" font-family="serif">测试</text>
  </g>
  <g transform="translate(720,270)">
    <rect x="0" y="0" width="110" height="55" rx="6" fill="#2d4a7a" stroke="#fff" stroke-width="1.2"/>
    <text x="55" y="33" text-anchor="middle" fill="#fff" font-size="14" font-family="serif">部署</text>
  </g>
  <g stroke="#d4a017" stroke-width="1" fill="none" stroke-dasharray="4,3">
    <path d="M700,130 L720,147"/>
    <path d="M700,160 L720,222"/>
    <path d="M700,160 L720,297"/>
  </g>
  <text x="790" y="400" fill="#1e6a3a" font-size="13" font-family="sans">残留率 9%</text>

  <!-- 三级递进箭头 -->
  <g stroke="#fff" stroke-width="2" fill="none">
    <path d="M220,160 C240,160 240,160 260,160"/>
    <path d="M400,200 C480,200 480,200 560,160"/>
  </g>

  <!-- 主标题 -->
  <text x="480" y="50" text-anchor="middle" fill="#fff" font-size="30" font-family="serif">协作式 Agent 团队</text>
  <text x="480" y="78" text-anchor="middle" fill="#d4a017" font-size="18" font-family="sans">软件开发流水线</text>

  <!-- 右下编号 -->
  <text x="910" y="515" text-anchor="end" fill="#d4a017" font-size="36" font-family="serif" opacity="0.5">3.11</text>
  <!-- 底部署名 -->
  <text x="480" y="515" text-anchor="middle" fill="#fff" font-size="14" font-family="sans" opacity="0.7">Token 炼金师 著</text>
</svg>

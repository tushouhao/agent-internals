<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1f3d"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- 单会话阶 -->
  <g transform="translate(60,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e3a5f" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="17" font-family="serif">单会话阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">完成 0% 续跑 0%</text>
  </g>

  <!-- 跨会话阶 -->
  <g transform="translate(280,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#2d4a7a" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="17" font-family="serif">跨会话阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">完成 82% 续跑 100%</text>
  </g>
  <g transform="translate(280,250)">
    <rect x="0" y="0" width="160" height="50" rx="6" fill="#1e3a5f" stroke="#fff" stroke-width="1"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">断点快照 JSON</text>
  </g>

  <!-- 跨日阶 -->
  <g transform="translate(500,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#0a1f3d" stroke="#d4a017" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#d4a017" font-size="17" font-family="serif">跨日阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">完成 100% 续跑 100%</text>
  </g>
  <g transform="translate(500,250)">
    <rect x="0" y="0" width="160" height="50" rx="6" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">冷存 + 一致性哈希</text>
  </g>
  <g transform="translate(500,320)">
    <rect x="0" y="0" width="160" height="40" rx="6" fill="#8b6a1a" stroke="#fff" stroke-width="1"/>
    <text x="80" y="25" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">漂移率 7%</text>
  </g>

  <!-- 递进箭头 -->
  <g stroke="#fff" stroke-width="2" fill="none">
    <path d="M220,170 L280,170"/>
    <path d="M440,170 L500,170"/>
  </g>

  <!-- 续跑率柱对照 -->
  <g transform="translate(720,150)">
    <text x="0" y="0" fill="#fff" font-size="13" font-family="sans">续跑率对照</text>
    <rect x="0" y="10" width="40" height="20" fill="#8b1a1a"/>
    <text x="50" y="25" fill="#fff" font-size="12" font-family="sans">单会话 0%</text>
    <rect x="0" y="40" width="100" height="20" fill="#8b6a1a"/>
    <text x="110" y="55" fill="#fff" font-size="12" font-family="sans">跨会话 100%</text>
    <rect x="0" y="70" width="120" height="20" fill="#1e6a3a"/>
    <text x="130" y="85" fill="#fff" font-size="12" font-family="sans">跨日 100%</text>
  </g>

  <!-- 主标题 -->
  <text x="480" y="50" text-anchor="middle" fill="#fff" font-size="30" font-family="serif">长程任务 Agent</text>
  <text x="480" y="78" text-anchor="middle" fill="#d4a017" font-size="18" font-family="sans">跨日跨会话的持久化</text>

  <!-- 右下编号 -->
  <text x="910" y="515" text-anchor="end" fill="#d4a017" font-size="36" font-family="serif" opacity="0.5">3.12</text>
  <text x="480" y="515" text-anchor="middle" fill="#fff" font-size="14" font-family="sans" opacity="0.7">Token 炼金师 著</text>
</svg>

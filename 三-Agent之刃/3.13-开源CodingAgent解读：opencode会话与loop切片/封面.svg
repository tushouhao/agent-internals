<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1f3d"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- 会话内 loop 阶 -->
  <g transform="translate(60,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e3a5f" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="16" font-family="serif">会话内 loop 阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">完成 0% 切片 0%</text>
  </g>
  <g transform="translate(60,240)">
    <circle cx="80" cy="30" r="25" fill="none" stroke="#fff" stroke-width="1.5"/>
    <path d="M95,30 L105,30 M100,25 L105,30 L100,35" stroke="#fff" stroke-width="1.5" fill="none"/>
    <text x="80" y="70" text-anchor="middle" fill="#fff" font-size="11" font-family="sans">ReAct 循环</text>
  </g>

  <!-- 跨会话续阶 -->
  <g transform="translate(280,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#2d4a7a" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="16" font-family="serif">跨会话续阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">完成 78% 切片 61%</text>
  </g>
  <g transform="translate(280,240)">
    <rect x="0" y="10" width="60" height="30" rx="4" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <text x="30" y="30" text-anchor="middle" fill="#fff" font-size="11" font-family="sans">会话末快照</text>
    <path d="M60,25 L100,25 M95,20 L100,25 L95,30" stroke="#fff" stroke-width="1.5" fill="none"/>
    <rect x="100" y="10" width="60" height="30" rx="4" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <text x="130" y="30" text-anchor="middle" fill="#fff" font-size="11" font-family="sans">新会话续跑</text>
  </g>

  <!-- 全切片阶 -->
  <g transform="translate(500,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#0a1f3d" stroke="#d4a017" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#d4a017" font-size="16" font-family="serif">全切片阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">完成 100% 切片 94%</text>
  </g>
  <g transform="translate(500,240)">
    <rect x="0" y="0" width="50" height="25" rx="4" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <text x="25" y="17" text-anchor="middle" fill="#fff" font-size="10" font-family="sans">会话</text>
    <rect x="55" y="0" width="50" height="25" rx="4" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <text x="80" y="17" text-anchor="middle" fill="#fff" font-size="10" font-family="sans">loop</text>
    <rect x="110" y="0" width="50" height="25" rx="4" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <text x="135" y="17" text-anchor="middle" fill="#fff" font-size="10" font-family="sans">产物</text>
    <text x="80" y="45" text-anchor="middle" fill="#d4a017" font-size="11" font-family="sans">三维哈希索引</text>
  </g>

  <!-- 递进箭头 -->
  <g stroke="#fff" stroke-width="2" fill="none">
    <path d="M220,170 L280,170"/>
    <path d="M440,170 L500,170"/>
  </g>

  <!-- 切片完备率柱对照 -->
  <g transform="translate(720,150)">
    <text x="0" y="0" fill="#fff" font-size="13" font-family="sans">切片完备率</text>
    <rect x="0" y="10" width="5" height="20" fill="#8b1a1a"/>
    <text x="15" y="25" fill="#fff" font-size="12" font-family="sans">会话内 0%</text>
    <rect x="0" y="40" width="70" height="20" fill="#8b6a1a"/>
    <text x="80" y="55" fill="#fff" font-size="12" font-family="sans">跨会话 61%</text>
    <rect x="0" y="70" width="115" height="20" fill="#1e6a3a"/>
    <text x="125" y="85" fill="#fff" font-size="12" font-family="sans">全切片 99%</text>
  </g>

  <!-- 主标题 -->
  <text x="480" y="50" text-anchor="middle" fill="#fff" font-size="28" font-family="serif">opencode 会话与 loop 切片</text>
  <text x="480" y="78" text-anchor="middle" fill="#d4a017" font-size="16" font-family="sans">开源 Coding Agent 解读</text>

  <text x="910" y="515" text-anchor="end" fill="#d4a017" font-size="36" font-family="serif" opacity="0.5">3.13</text>
  <text x="480" y="515" text-anchor="middle" fill="#fff" font-size="14" font-family="sans" opacity="0.7">Token 炼金师 著</text>
</svg>

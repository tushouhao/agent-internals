<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1f3d"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>

  <g transform="translate(60,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e3a5f" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="16" font-family="serif">参数幻觉阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">调用 0% 残留 100%</text>
  </g>
  <g transform="translate(60,240)">
    <rect x="20" y="10" width="120" height="30" rx="4" fill="#8b1a1a" stroke="#fff" stroke-width="1"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="11" font-family="sans">参数类型错 123</text>
  </g>

  <g transform="translate(280,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#2d4a7a" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="16" font-family="serif">语义漂移阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">调用 84% 残留 8%</text>
  </g>
  <g transform="translate(280,240)">
    <text x="20" y="25" fill="#fff" font-size="11" font-family="sans">轮1:读</text>
    <text x="80" y="25" fill="#8b6a1a" font-size="11" font-family="sans">轮3:读+删</text>
    <text x="140" y="25" fill="#8b1a1a" font-size="11" font-family="sans">轮5:删</text>
    <text x="80" y="50" text-anchor="middle" fill="#1e6a3a" font-size="11" font-family="sans">漂移检测</text>
  </g>

  <g transform="translate(500,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#0a1f3d" stroke="#d4a017" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#d4a017" font-size="16" font-family="serif">工具失配阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">适配 0% 失配 100%</text>
  </g>
  <g transform="translate(500,240)">
    <rect x="0" y="10" width="60" height="25" rx="4" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <text x="30" y="27" text-anchor="middle" fill="#fff" font-size="10" font-family="sans">旧:path</text>
    <rect x="70" y="5" width="90" height="35" rx="4" fill="#8b1a1a" stroke="#d4a017" stroke-width="1"/>
    <text x="115" y="27" text-anchor="middle" fill="#fff" font-size="10" font-family="sans">新:path+mode</text>
  </g>

  <g stroke="#fff" stroke-width="2" fill="none">
    <path d="M220,170 L280,170"/>
    <path d="M440,170 L500,170"/>
  </g>

  <g transform="translate(720,150)">
    <text x="0" y="0" fill="#fff" font-size="13" font-family="sans">漂移残留率</text>
    <rect x="0" y="10" width="115" height="20" fill="#8b1a1a"/>
    <text x="125" y="25" fill="#fff" font-size="12" font-family="sans">参数幻觉 100%</text>
    <rect x="0" y="40" width="5" height="20" fill="#8b6a1a"/>
    <text x="15" y="55" fill="#fff" font-size="12" font-family="sans">漂移检测 4%</text>
    <rect x="0" y="70" width="115" height="20" fill="#8b1a1a"/>
    <text x="125" y="85" fill="#fff" font-size="12" font-family="sans">工具失配 100%</text>
  </g>

  <text x="480" y="50" text-anchor="middle" fill="#fff" font-size="28" font-family="serif">工具调用失败：参数幻觉与语义漂移</text>
  <text x="480" y="78" text-anchor="middle" fill="#d4a017" font-size="16" font-family="sans">卷四 Agent 之盾</text>

  <text x="910" y="515" text-anchor="end" fill="#d4a017" font-size="36" font-family="serif" opacity="0.5">4.2</text>
  <text x="480" y="515" text-anchor="middle" fill="#fff" font-size="14" font-family="sans" opacity="0.7">Token 嘄金师 著</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1f3d"/>
      <stop offset="1" stop-color="#1e3a5f"/>
    </linearGradient>
  </defs>
  <rect width="960" height="540" fill="url(#bg)"/>

  <!-- 单目标失败阶 -->
  <g transform="translate(60,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#1e3a5f" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="16" font-family="serif">单目标失败阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">完成 0% 残留 100%</text>
  </g>
  <g transform="translate(60,240)">
    <rect x="40" y="10" width="80" height="30" rx="4" fill="#8b1a1a" stroke="#fff" stroke-width="1"/>
    <text x="80" y="30" text-anchor="middle" fill="#fff" font-size="11" font-family="sans">工具断</text>
  </g>

  <!-- 子目标爆炸阶 -->
  <g transform="translate(280,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#2d4a7a" stroke="#fff" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#fff" font-size="16" font-family="serif">子目标爆炸阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">收敛 0% 残留 100%</text>
  </g>
  <g transform="translate(280,240)">
    <circle cx="30" cy="25" r="8" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <circle cx="80" cy="15" r="8" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <circle cx="130" cy="35" r="8" fill="#2d4a7a" stroke="#fff" stroke-width="1"/>
    <line x1="30" y1="25" x2="80" y2="15" stroke="#8b1a1a" stroke-width="1"/>
    <line x1="80" y1="15" x2="130" y2="35" stroke="#8b1a1a" stroke-width="1"/>
    <line x1="130" y1="35" x2="30" y2="25" stroke="#8b1a1a" stroke-width="1"/>
    <text x="80" y="60" text-anchor="middle" fill="#8b1a1a" font-size="11" font-family="sans">N^2 边爆炸</text>
  </g>

  <!-- 死循环阶 -->
  <g transform="translate(500,130)">
    <rect x="0" y="0" width="160" height="80" rx="8" fill="#0a1f3d" stroke="#d4a017" stroke-width="1.5"/>
    <text x="80" y="35" text-anchor="middle" fill="#d4a017" font-size="16" font-family="serif">死循环阶</text>
    <text x="80" y="58" text-anchor="middle" fill="#fff" font-size="12" font-family="sans">完成 92% 残留 8%</text>
  </g>
  <g transform="translate(500,240)">
    <circle cx="30" cy="25" r="8" fill="#0a1f3d" stroke="#d4a017" stroke-width="1"/>
    <circle cx="80" cy="15" r="8" fill="#0a1f3d" stroke="#d4a017" stroke-width="1"/>
    <circle cx="130" cy="35" r="8" fill="#0a1f3d" stroke="#d4a017" stroke-width="1"/>
    <path d="M30,25 L80,15 L130,35 L30,25" stroke="#1e6a3a" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
    <text x="80" y="60" text-anchor="middle" fill="#1e6a3a" font-size="11" font-family="sans">环检测防患</text>
  </g>

  <!-- 递进箭头 -->
  <g stroke="#fff" stroke-width="2" fill="none">
    <path d="M220,170 L280,170"/>
    <path d="M440,170 L500,170"/>
  </g>

  <!-- 死循环残留率柱对照 -->
  <g transform="translate(720,150)">
    <text x="0" y="0" fill="#fff" font-size="13" font-family="sans">死循环残留率</text>
    <rect x="0" y="10" width="115" height="20" fill="#8b1a1a"/>
    <text x="125" y="25" fill="#fff" font-size="12" font-family="sans">单目标 100%</text>
    <rect x="0" y="40" width="115" height="20" fill="#8b1a1a"/>
    <text x="125" y="55" fill="#fff" font-size="12" font-family="sans">子目标 100%</text>
    <rect x="0" y="70" width="0" height="20" fill="#1e6a3a"/>
    <text x="15" y="85" fill="#fff" font-size="12" font-family="sans">死循环检测 0%</text>
  </g>

  <!-- 主标题 -->
  <text x="480" y="50" text-anchor="middle" fill="#fff" font-size="28" font-family="serif">规划失败：子目标爆炸与死循环</text>
  <text x="480" y="78" text-anchor="middle" fill="#d4a017" font-size="16" font-family="sans">卷四 Agent 之盾 · 开卷篇</text>

  <text x="910" y="515" text-anchor="end" fill="#d4a017" font-size="36" font-family="serif" opacity="0.5">4.1</text>
  <text x="480" y="515" text-anchor="middle" fill="#fff" font-size="14" font-family="sans" opacity="0.7">Token 嘄金师 著</text>
</svg>
